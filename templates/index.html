<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapLink</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <h1>SnapLink</h1>
    <form id="shorten-form">
        <input type="url" id="original-url" placeholder="Enter a URL to shorten">
        <button id="shorten-btn">Shorten</button>
        <div id="error-message"></div>
    </form>
    <div id="short-url"></div>
    <h2>Link History</h2>
    <table id="link-history">
        <thead>
            <tr>
                <th>Short Code</th>
                <th>Original URL</th>
                <th>Click Count</th>
            </tr>
        </thead>
        <tbody id="link-history-body">
        </tbody>
    </table>

    <script>
        const shortenForm = document.getElementById('shorten-form');
        const shortenBtn = document.getElementById('shorten-btn');
        const originalUrlInput = document.getElementById('original-url');
        const shortUrlDiv = document.getElementById('short-url');
        const linkHistoryBody = document.getElementById('link-history-body');
        const errorMessageDiv = document.getElementById('error-message');

        shortenBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const originalUrl = originalUrlInput.value.trim();
            if (!originalUrl) return;

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ original_url: originalUrl })
                });

                if (response.ok) {
                    const data = await response.json();
                    shortUrlDiv.innerText = `Short URL: ${data.short_url}`;
                    errorMessageDiv.innerText = '';
                    fetchLinkHistory();
                } else {
                    const errorData = await response.json();
                    errorMessageDiv.innerText = errorData.error;
                }
            } catch (error) {
                console.error(error);
            }
        });

        async function fetchLinkHistory() {
            try {
                const response = await fetch('/');
                if (response.ok) {
                    const data = await response.json();
                    linkHistoryBody.innerHTML = '';
                    data.forEach((link) => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${link.short_code}</td>
                            <td>${link.original_url}</td>
                            <td>${link.click_count}</td>
                        `;
                        linkHistoryBody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }

        fetchLinkHistory();
    </script>
</body>
</html>
